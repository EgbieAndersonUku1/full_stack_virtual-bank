{% load static %}

<section id="add-pin">
    <div class="spinner" id="add-pin__spinner"></div>
    <div class="add-pin__container center">
        <img src="{% static '/images/icons/lock.svg' %}" alt="The image pin" class="mt-48" id="pin-lock-img">


        <form action="" id="add-pin-form">

            <fieldset class="form-row">

                <legend class="mb-16">Enter your six digit pin</legend>

                <div class="flex-grid six-column-grid sortcode-fields request-recipient-account">
                    <input type="text" name="pin_1" id="pin_1" maxlength="1" aria-label="pin_1 1" required>

                    <input type="text" name="pin_2" id="pin_2" maxlength="1" aria-label="pin 2" required>

                    <input type="text" name="pin_3" id="pin_3" maxlength="1" aria-label="pin 3" required>

                    <input type="text" name="pin_4" id="pin_4" maxlength="1" aria-label="pin 4" required>

                    <input type="text" name="pin_5" id="pin_5" maxlength="1" aria-label="pint 5" required>

                    <input type="text" name="pin_6" id="pin_6" maxlength="1" aria-label="Sort code digit 6" required>
                </div>
            </fieldset>

            <div class="button mt-24">
                <button type="submit" class="btn-large white-text blue-bg capitalise">submit</button>
            </div>
        </form>
    </div>


</section>
